[opener]
edit = [
	{ run = "nvim %*",  block = true, desc = "nvim", for = "windows" },
	{ run = "nvim $@",  block = true, desc = "nvim", for = "unix" },
]

[open]
prepend_rules = [
    { name = "*.toml", use = "edit" },
]

[mgr]
ratio = [2,4,4]
show_hidden = true
show_symlink = true
linemode = "size"

